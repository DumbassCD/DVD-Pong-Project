<!DOCTYPE html>
<html>
<head>
    <title>dvd pong title screen test</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            text-align: center;
        }
        canvas {
            border: 3px solid #00ACE6;
            background: #222;
        }
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .game-btn {
            opacity: 0.4;
            transition: opacity 0.6s ease, transform 0.1s ease;
        }
        .game-btn:hover {
            opacity: 1;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <p>Copyright: Fortyair and DumbassCD</p>

    <!-- logo -->
    <img src="dvd_dvdponglogo.jpg" width="1000" height="350" id="mainImg">

    <div id="print" style="margin: 20px 0;">BETA 4.0</div>

    <!-- Controls start and exit + options!-->
    <div class="controls">
        <img src="sg2011mainposesonicalt.webp" width="60" height="110;">
        <img src="dvd_start.png" width="190" height="90" onclick="startGame()" class="game-btn;">
        <img src="dvd_exit.png" width="190" height="90" onclick="exitGame()" class="game-btn;">
		<img src="dvd_options.png" width="190" height="90" onClick="openOptions()" class="game-btn;">
    </div>

    <script>
        //Start
        function startGame() {
            //Boot main project file 
            alert("Lets spin!");
            window.location.href = "thanksforfix-dvdpong-beta4.html";
        }

        //Close
        function exitGame() {
		    //Exit
            if (confirm("Wanna quit the game?")) {
                window.close(); //Close main project file
                // Alternatively: window.location.href = "about:blank";
            }
        }
		//Options (Incomplete as of April 2026)
		function openOptions() {
		    //Boot options file
			window.location.href = "thanksforfix-dvdpong-optionsscreen.html";
		}
		 
    </script>
</body>
</html>
